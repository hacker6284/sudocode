name: Release binaries

# Tag v* → build per-platform sudoc binaries → GitHub release with
# checksums. Downstream consumers (e.g. Bazel http_file rules) pin a
# version + sha256 instead of building sudoc from floating main.
# workflow_dispatch rehearses the builds without releasing anything.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sudoc
      - name: Build
        working-directory: sudoc
        run: cargo build --release
      - name: Smoke (embedded stdlib present)
        run: |
          printf 'import std.strings\n\ntest "std import works"\n    assert strings.to_upper("ok") == "OK"\n' > /tmp/smoke.sudo
          ./sudoc/target/release/sudoc check /tmp/smoke.sudo
      - name: Package
        run: |
          BIN="sudoc-${{ matrix.target }}"
          cp sudoc/target/release/sudoc "$BIN"
          shasum -a 256 "$BIN" > "$BIN.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: sudoc-${{ matrix.target }}
          path: |
            sudoc-${{ matrix.target }}
            sudoc-${{ matrix.target }}.sha256

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sudoc-*
          generate_release_notes: true
