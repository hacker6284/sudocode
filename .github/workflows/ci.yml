name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # macOS has every target toolchain: clang, python3, node, swiftc; Zig and GHC (Haskell) are installed.
  all-targets:
    name: All seven targets (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sudoc
      # GHC install is ~10 min uncached; ~/.ghcup restores in well under one.
      - name: Cache GHC
        uses: actions/cache@v4
        with:
          path: ~/.ghcup
          key: ghcup-${{ runner.os }}-${{ runner.arch }}-ghc-9.10.1
      - name: Haskell toolchain (ghc)
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.10.1"
          cabal-update: false
      - name: Toolchain versions
        run: |
          rustc --version
          clang --version | head -1
          python3 --version
          node --version
          swiftc --version | head -1
          zig version
          ghc --version
      - name: Clippy (zero warnings)
        working-directory: sudoc
        run: cargo clippy --all-targets -- -D warnings
      - name: Unit, golden, and lockstep tests
        working-directory: sudoc
        run: cargo test --workspace
      - name: Build sudoc
        working-directory: sudoc
        run: cargo build --release
      - name: Conformance suite (all seven backends, lockstep)
        run: |
          set -o pipefail
          ./sudoc/target/release/sudoc conformance | tee conformance-output.txt
      - name: C sanitizers were enabled (macOS)
        run: |
          grep -q 'C sanitizers: on (asan,ubsan)' conformance-output.txt
      - name: Examples and stdlib in lockstep
        run: ./sudoc/target/release/sudoc test examples/*.sudo stdlib/*.sudo
      - name: Rustdoc builds clean
        working-directory: sudoc
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  # Linux sanity: six targets via backends/*/*.sudoc-backend.json discovery (no Swift toolchain on the runner).
  linux:
    name: Six targets via discovery (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sudoc
      - name: Haskell toolchain (runner-provided)
        run: ghc --version && runghc --version
      - name: Build sudoc
        working-directory: sudoc
        run: cargo build --release
      - name: Conformance suite (py, c, js, rs, zig, hs)
        run: |
          set -o pipefail
          ./sudoc/target/release/sudoc conformance \
            --target py --target c --target js --target rs --target zig --target hs \
            | tee conformance-output.txt
      - name: C sanitizers were enabled (Linux, incl. lsan)
        run: |
          grep -q 'C sanitizers: on (asan,ubsan,lsan)' conformance-output.txt
      # Examples and stdlib execute generated code too, so they need Linux
      # platform coverage exactly like conformance does — a build/link/runtime
      # bug (the -lm class) in the stdlib or an example must not be macOS-only.
      - name: Examples and stdlib in lockstep (six targets)
        run: |
          ./sudoc/target/release/sudoc test \
            --target py --target c --target js --target rs --target zig --target hs \
            examples/*.sudo stdlib/*.sudo
