name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # macOS has every target toolchain: clang, python3, node, swiftc; Zig is installed.
  all-targets:
    name: All six targets (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sudoc
      - name: Toolchain versions
        run: |
          rustc --version
          clang --version | head -1
          python3 --version
          node --version
          swiftc --version | head -1
          zig version
      - name: Clippy (zero warnings)
        working-directory: sudoc
        run: cargo clippy --all-targets -- -D warnings
      - name: Unit, golden, and lockstep tests
        working-directory: sudoc
        run: cargo test --workspace
      - name: Build sudoc
        working-directory: sudoc
        run: cargo build --release
      - name: Conformance suite (all backends, lockstep)
        run: ./sudoc/target/release/sudoc conformance
      - name: Examples and stdlib in lockstep
        run: ./sudoc/target/release/sudoc test examples/*.sudo stdlib/*.sudo
      - name: Rustdoc builds clean
        working-directory: sudoc
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  # Linux sanity: five targets (no Swift toolchain on the runner).
  linux:
    name: Five targets (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sudoc
      - name: Build sudoc
        working-directory: sudoc
        run: cargo build --release
      - name: Conformance suite (py, c, js, rs, zig)
        run: >
          ./sudoc/target/release/sudoc conformance
          --target py --target c --target js --target rs --target zig
